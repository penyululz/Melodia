name: Deploy Melodia to VPS

env:
  NEXT_TELEMETRY_DISABLED: "1"
  MELODIA_BUILD_DB: "1"

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: melodia-vps-deploy
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Typecheck
        run: corepack pnpm typecheck

      - name: Lint
        run: corepack pnpm lint

      - name: Build
        run: corepack pnpm build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    env:
      APP_ROOT: ${{ secrets.APP_ROOT || '/var/www/melodia' }}
      SSH_PORT: ${{ secrets.VPS_PORT || '22' }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9
          run_install: false

      - name: Create release archive
        run: |
          STAGING_DIR="$(mktemp -d)"
          git archive --format=tar HEAD | tar -x -C "$STAGING_DIR"
          rm -rf \
            "$STAGING_DIR/.github" \
            "$STAGING_DIR/.next" \
            "$STAGING_DIR/node_modules" \
            "$STAGING_DIR/data" \
            "$STAGING_DIR/.env" \
            "$STAGING_DIR"/.env.* \
            "$STAGING_DIR/tsconfig.tsbuildinfo"
          tar -C "$STAGING_DIR" -czf melodia-release.tgz .
          rm -rf "$STAGING_DIR"

      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          test -n "$VPS_HOST" || (echo "VPS_HOST secret is missing" && exit 1)
          test -n "$VPS_USER" || (echo "VPS_USER secret is missing" && exit 1)
          test -n "$VPS_SSH_KEY" || (echo "VPS_SSH_KEY secret is missing" && exit 1)

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" | tr -d '\r' > ~/.ssh/melodia_deploy_key
          chmod 600 ~/.ssh/melodia_deploy_key

          cat > ~/.ssh/config <<EOF
          Host melodia-vps
            HostName $VPS_HOST
            User $VPS_USER
            Port $SSH_PORT
            IdentityFile ~/.ssh/melodia_deploy_key
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            ServerAliveInterval 30
            ConnectTimeout 20
          EOF
          chmod 600 ~/.ssh/config

          ssh-keyscan -p "$SSH_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload release
        run: |
          scp melodia-release.tgz melodia-vps:/tmp/melodia-release-${GITHUB_SHA}.tgz

      - name: Activate release
        run: |
          ssh melodia-vps "APP_ROOT='$APP_ROOT' DEPLOY_SHA='$GITHUB_SHA' bash -s" <<'REMOTE'
          set -euo pipefail

          RELEASE_DIR="$APP_ROOT/releases/$DEPLOY_SHA"
          SHARED_DIR="$APP_ROOT/shared"
          PREVIOUS_RELEASE="$(readlink -f "$APP_ROOT/current" 2>/dev/null || true)"

          mkdir -p "$APP_ROOT/releases" "$SHARED_DIR/data" "$SHARED_DIR/uploads" "$SHARED_DIR/covers" "$SHARED_DIR/music"
          rm -rf "$RELEASE_DIR"
          mkdir -p "$RELEASE_DIR"
          tar -xzf "/tmp/melodia-release-$DEPLOY_SHA.tgz" -C "$RELEASE_DIR"

          mkdir -p "$RELEASE_DIR/data" "$RELEASE_DIR/public/music/uploads" "$RELEASE_DIR/public/covers"

          if [ -f "$SHARED_DIR/.env.local" ]; then
            ln -sfn "$SHARED_DIR/.env.local" "$RELEASE_DIR/.env.local"
          fi

          cd "$RELEASE_DIR"
          corepack enable
          corepack pnpm install --frozen-lockfile
          NEXT_TELEMETRY_DISABLED=1 MELODIA_BUILD_DB=1 corepack pnpm build
          mkdir -p .next/standalone/.next
          rm -rf .next/standalone/.next/static .next/standalone/public
          cp -R .next/static .next/standalone/.next/static
          cp -R public .next/standalone/public

          rm -rf "$RELEASE_DIR/data"
          ln -sfn "$SHARED_DIR/data" "$RELEASE_DIR/data"
          mkdir -p "$RELEASE_DIR/public/music"
          rm -rf "$RELEASE_DIR/public/music/uploads" "$RELEASE_DIR/public/covers"
          ln -sfn "$SHARED_DIR/uploads" "$RELEASE_DIR/public/music/uploads"
          ln -sfn "$SHARED_DIR/covers" "$RELEASE_DIR/public/covers"

          rm -rf .next/standalone/data .next/standalone/public/music/uploads .next/standalone/public/covers
          mkdir -p .next/standalone/public/music
          ln -sfn "$SHARED_DIR/data" .next/standalone/data
          ln -sfn "$SHARED_DIR/uploads" .next/standalone/public/music/uploads
          ln -sfn "$SHARED_DIR/covers" .next/standalone/public/covers

          ln -sfn "$RELEASE_DIR" "$APP_ROOT/current"
          sudo systemctl restart melodia

          HEALTHY=0
          for attempt in $(seq 1 30); do
            if curl -fsS -I http://127.0.0.1:3001 >/dev/null; then
              HEALTHY=1
              break
            fi
            sleep 2
          done

          if [ "$HEALTHY" != "1" ]; then
            sudo journalctl -u melodia -n 120 --no-pager -l || true
            if [ -n "$PREVIOUS_RELEASE" ] && [ -d "$PREVIOUS_RELEASE" ]; then
              ln -sfn "$PREVIOUS_RELEASE" "$APP_ROOT/current"
              sudo systemctl restart melodia || true
            fi
            exit 1
          fi

          ACTIVE_RELEASE="$(readlink -f "$APP_ROOT/current")"
          find "$APP_ROOT/releases" -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' \
            | sort -rn \
            | awk -v active="$ACTIVE_RELEASE" 'NR > 5 && $2 != active { print $2 }' \
            | xargs -r rm -rf
          rm -f "/tmp/melodia-release-$DEPLOY_SHA.tgz"
          REMOTE
